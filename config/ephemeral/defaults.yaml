deployment_name: "{{ aws_region }}{% if eph_prefix %}-{{ eph_prefix }}{% endif %}"

dns:
  # ci is true when BUILD_ID is set (CI pipelines); selects ci00 vs dev0 account pool
  domain: "{% if ci %}ci00{% else %}dev0{% endif %}.rosa.devshift.net"

regional_cluster:
  enable_bastion: true

management_cluster_defaults:
  enable_bastion: true

observability:
  pagerduty:
    enabled: false
