# =============================================================================
# Global defaults — inherited by all environments and regions.
#
# Inheritance chain:
#   defaults.yaml → <env>/defaults.yaml → <env>/<region>.yaml
#
# All string values support Jinja2 templating. The following variables are
# injected automatically by render.py:
#   {{ environment }}    — environment directory name (e.g. "integration")
#   {{ aws_region }}     — region file stem (e.g. "us-east-1")
#   {{ cluster_prefix }} — management_cluster key (e.g. "mc01")
# =============================================================================

# -- Git references -----------------------------------------------------------
# Used by ArgoCD bootstrap ApplicationSets to pin chart versions.
# Set to a commit hash in staging/production to pin; "main" follows HEAD.
git:
  # → argocd-bootstrap-*/applicationset.yaml (chart + generator revision)
  revision: main
  # → pipeline-provisioner (bootstrap pipeline revision)
  bootstrap_revision: main

# -- AWS identity -------------------------------------------------------------
# Resolved per-region. Supports SSM parameter references via Jinja2 templating.
aws:
  # Regional AWS account ID
  # → pipeline-provisioner-inputs/regional-cluster.json
  # → pipeline-regional-cluster-inputs/terraform.json
  account_id: "ssm:///infra/{{ environment }}/{{ aws_region }}/account_id"
  # Default AWS account ID for management clusters (used when mc entry has no account_id)
  # → pipeline-provisioner-inputs/management-cluster-*.json
  # → pipeline-management-cluster-*-inputs/terraform.json
  management_cluster_account_id: "ssm:///infra/{{ environment }}/{{ aws_region }}/{{ cluster_prefix }}/account_id"

# -- DNS ----------------------------------------------------------------------
dns:
  # Base domain for the environment. Must be set per environment.
  # → pipeline-provisioner-inputs/terraform.json
  domain: ""

# -- Terraform common variables -----------------------------------------------
# Shared across all terraform configurations (RC, MC, and provisioner pipelines).
# → pipeline-regional-cluster-inputs/terraform.json
# → pipeline-management-cluster-*-inputs/terraform.json
terraform_common:
  app_code: "infra"
  service_phase: "dev"
  cost_center: "000"
  enable_bastion: false

# -- ArgoCD application values ------------------------------------------------
# Helm values overrides for ArgoCD-managed applications, keyed by cluster type.
# → argocd-values-<cluster-type>.yaml
argocd:
  management-cluster:
    hypershift:
      oidcStorageS3Bucket:
        name: "hypershift-mc-{{ aws_region }}"
        region: "{{ aws_region }}"
      externalDns:
        domain: "dev.{{ aws_region }}.rosa.example.com"
  regional-cluster:
    maestro:
      mqttEndpoint: "xxx.iot.{{ aws_region }}.amazonaws.com"
    someOtherSetting: "value"

# -- Cluster topology (defined per region) ------------------------------------
# management_clusters:
#   mc01:                          # Management cluster ID
#     account_id: "123456789012"   # Optional: overrides aws.management_cluster_account_id
#     delete: true                 # Optional: triggers infrastructure destruction
#     delete_pipeline: true        # Optional: triggers pipeline removal

