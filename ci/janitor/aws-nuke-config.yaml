# aws-nuke configuration for ROSA Regional Platform CI accounts.
#
# Reference: https://github.com/ekristen/aws-nuke (v3)

regions:
  - us-east-1
  - global  # IAM, S3, Route53, etc.

# Needed but not used.
blocklist:
 - prod

# CI accounts don't have IAM aliases; skip that safety check.
bypass-alias-check-accounts:
  - "018092638725"
  - "633630779107"
  - "791666871613"
  - "855246887846"
  - "599476212575"

accounts:
  # Sandbox 05
  "018092638725":
    filters: &preserve-filters
      # ---------------------------------------------------------------
      # Preserve CI identity: IAM User "e2e"
      # ---------------------------------------------------------------
      IAMUser:
        - "e2e"

      IAMUserAccessKey:
        - property: UserName
          value: "e2e"

      IAMUserPolicyAttachment:
        - property: UserName
          value: "e2e"

      IAMUserPolicy:
        - property: UserName
          value: "e2e"

      IAMUserGroupAttachment:
        - property: UserName
          value: "e2e"

      IAMLoginProfile:
        - "e2e"

      # ---------------------------------------------------------------
      # Preserve OrganizationAccountAccessRole (AWS Organizations)
      # ---------------------------------------------------------------
      IAMRole:
        - "OrganizationAccountAccessRole"
        - property: Path
          type: glob
          value: "/aws-service-role/*"

      IAMRolePolicyAttachment:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"

      IAMRolePolicy:
        - property: RoleName
          value: "OrganizationAccountAccessRole"
        - property: RoleName
          type: glob
          value: "AWSServiceRoleFor*"

      # ---------------------------------------------------------------
      # Preserve ECR repositories for nightly-e2e IAM user
      # ---------------------------------------------------------------
      ECRRepository:
        - property: RepositoryName
          type: glob
          value: "e2e-platform-*"

  # Int Control Account
  "633630779107":
    filters: *preserve-filters

  # Dev Control Account
  "791666871613":
    filters: *preserve-filters

  # e2e-dev-regional-cluster
  "599476212575":
    filters: *preserve-filters

  # e2e-dev-management-cluster-0
  "855246887846":
    filters: *preserve-filters

settings:
  # Disable deletion protection on resources that may have it enabled
  # from failed terraform runs, so aws-nuke can delete them.
  RDSInstance:
    DisableDeletionProtection: true
  DynamoDBTable:
    DisableDeletionProtection: true
