evaluation_interval: 1m

rule_files:
  - rules.yaml

tests:
  # Recording rule: returns 1 when HostedCluster Available condition is True
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
    promql_expr_test:
      - expr: hcp:hostedcluster_available{name="test-hcp"}
        eval_time: 5m
        exp_samples:
          - labels: 'hcp:hostedcluster_available{namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
            value: 1

  # Recording rule: returns 0 when HostedCluster condition is False.
  # All three StateSet series are present simultaneously — only status="True" value changes.
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="False", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="Unknown", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
    promql_expr_test:
      - expr: hcp:hostedcluster_available{name="test-hcp"}
        eval_time: 5m
        exp_samples:
          - labels: 'hcp:hostedcluster_available{namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
            value: 0

  # Fast burn alert fires at 100% downtime after 5m window + 1m for duration = ~6m
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
            exp_annotations:
              summary: "HCP availability error budget burning fast"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 is consuming its 30-day availability error budget at 14.4x the sustainable rate."

  # Fast burn alert does NOT fire at normal availability
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x10"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []

  # Slow burn alert fires at 100% downtime after 30m window + 2m for duration = ~32m
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x35"
    alert_rule_test:
      - eval_time: 32m
        alertname: HCPAvailabilityErrorBudgetSlowBurn
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
            exp_annotations:
              summary: "HCP availability error budget burning steadily"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 is consuming its 30-day availability error budget at 6x the sustainable rate."

  # Slow burn alert does NOT fire at normal availability
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "1x35"
    alert_rule_test:
      - eval_time: 32m
        alertname: HCPAvailabilityErrorBudgetSlowBurn
        exp_alerts: []

  # Fast burn alert is SUPPRESSED during initial rollout (metric <= 900)
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x10"
      - series: 'hypershift_cluster_initial_rolling_out_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "60+60x9"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts: []

  # Fast burn alert fires when rollout exceeds grace period (metric > 900)
  - interval: 1m
    input_series:
      - series: 'kube_customresource_hostedcluster_status_condition{type="KubeAPIServerAvailable", status="True", cluster_type="management-cluster", namespace="clusters-test", name="test-hcp", cluster="mc-1"}'
        values: "0x20"
      - series: 'hypershift_cluster_initial_rolling_out_duration_seconds{exported_namespace="clusters-test", name="test-hcp", cluster="mc-1", cluster_type="management-cluster"}'
        values: "901+60x19"
    alert_rule_test:
      - eval_time: 6m
        alertname: HCPAvailabilityErrorBudgetFastBurn
        exp_alerts:
          - exp_labels:
              severity: critical
              namespace: clusters-test
              name: test-hcp
              cluster: mc-1
            exp_annotations:
              summary: "HCP availability error budget burning fast"
              description: "HostedCluster test-hcp in namespace clusters-test on cluster mc-1 is consuming its 30-day availability error budget at 14.4x the sustainable rate."
