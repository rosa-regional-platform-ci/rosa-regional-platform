{{- if .Values.platformApi.zoa.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: zoa-job-config
  namespace: {{ .Values.platformApi.namespace }}
  labels:
    app: {{ .Values.platformApi.app.name }}
    component: zoa
data:
  image: {{ .Values.platformApi.zoa.jobImage | quote }}
  revision: {{ .Values.global.git_revision | default "unknown" | quote }}
  cpu_request: {{ .Values.platformApi.zoa.jobResources.requests.cpu | quote }}
  memory_request: {{ .Values.platformApi.zoa.jobResources.requests.memory | quote }}
  cpu_limit: {{ .Values.platformApi.zoa.jobResources.limits.cpu | quote }}
  memory_limit: {{ .Values.platformApi.zoa.jobResources.limits.memory | quote }}
  ttl_seconds: {{ .Values.platformApi.zoa.ttlSeconds | quote }}
  execution_timeout_seconds: {{ .Values.platformApi.zoa.executionTimeoutSeconds | default "1800" | quote }}
  upload_timeout_seconds: {{ .Values.platformApi.zoa.uploadTimeoutSeconds | default "120" | quote }}
  entrypoint.sh: |
    #!/bin/bash
    set -uo pipefail

    ts() { date -u '+%H:%M:%S'; }

    EXEC_LOG="/artifacts/execution.log"

    run_action() {
      echo "[zoa] execution_id=${RUN_ID} action=${ACTION_NAME} target=${CLUSTER_ID}"
      echo "[zoa] operator=${OPERATOR} scope=${SCOPE} type=${TYPE}"
      echo "[zoa] revision=${REVISION}"
      echo "[zoa] started_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      echo "---"
      /zoa/run.sh
    }

    echo "[$(ts)] runner starting"
    run_action 2>&1 | tee "$EXEC_LOG"
    EXIT_CODE=${PIPESTATUS[0]}

    echo "[zoa] exit_code=${EXIT_CODE}"
    echo "[zoa] completed_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

    OUTPUT_CM="${OUTPUT_CONFIGMAP:-}"
    if [ -z "${OUTPUT_CM}" ]; then
      echo "[$(ts)] ERROR: OUTPUT_CONFIGMAP not set, cannot store output"
      exit ${EXIT_CODE}
    fi

    echo "[$(ts)] patching configmap ${OUTPUT_CM}"

    LOG_B64=$(base64 -w0 "$EXEC_LOG")
    PATCH="{\"binaryData\":{\"execution.log\":\"${LOG_B64}\""

    if [ -f /artifacts/output.json ]; then
      OUTPUT_B64=$(base64 -w0 /artifacts/output.json)
      PATCH="${PATCH},\"output.json\":\"${OUTPUT_B64}\""
    fi

    PATCH="${PATCH}},\"data\":{\"exit-code\":\"${EXIT_CODE}\"}}"

    if kubectl patch configmap "${OUTPUT_CM}" -n "${JOB_NAMESPACE}" --type=merge -p "${PATCH}" 2>&1; then
      echo "[$(ts)] configmap patched"
    else
      echo "[$(ts)] ERROR: failed to patch ConfigMap"
    fi

    exit ${EXIT_CODE}
  upload_entrypoint.sh: |
    #!/bin/bash
    set -uo pipefail

    ts() { date -u '+%H:%M:%S'; }

    TIMEOUT="${UPLOAD_TIMEOUT:-120}"
    RUNNER_JOB="${RUNNER_JOB_NAME}"
    OUTPUT_CM="${OUTPUT_CONFIGMAP}"
    BUCKET="${ARTIFACT_BUCKET}"
    NS="${JOB_NAMESPACE}"

    echo "[$(ts)] waiting for runner ${RUNNER_JOB}"

    if ! kubectl wait --for=condition=complete --timeout="${TIMEOUT}s" "job/${RUNNER_JOB}" -n "${NS}" 2>/dev/null; then
      kubectl wait --for=condition=failed --timeout=10s "job/${RUNNER_JOB}" -n "${NS}" 2>/dev/null || true
    fi

    echo "[$(ts)] runner done, reading configmap"

    CM_JSON=$(kubectl get configmap "${OUTPUT_CM}" -n "${NS}" -o json 2>/dev/null)
    LOG_B64=$(printf '%s' "$CM_JSON" | jq -r '.binaryData["execution.log"] // empty')
    OUTPUT_B64=$(printf '%s' "$CM_JSON" | jq -r '.binaryData["output.json"] // empty')
    EXIT_CODE=$(printf '%s' "$CM_JSON" | jq -r '.data["exit-code"] // "1"')

    echo "[$(ts)] configmap read done"

    if [ -z "${LOG_B64}" ] && [ -z "${OUTPUT_B64}" ]; then
      echo "[$(ts)] ERROR: ConfigMap has no data — runner crashed before writing"
      exit 1
    fi

    mkdir -p /tmp/upload
    [ -n "${LOG_B64}" ] && printf '%s' "${LOG_B64}" | base64 -d > /tmp/upload/execution.log
    [ -n "${OUTPUT_B64}" ] && printf '%s' "${OUTPUT_B64}" | base64 -d > /tmp/upload/output.json

    echo "--- upload ---" >> /tmp/upload/execution.log
    echo "[$(ts)] uploading to s3://${BUCKET}/${RUN_ID}/" | tee -a /tmp/upload/execution.log

    if aws s3 cp /tmp/upload/ "s3://${BUCKET}/${RUN_ID}/" --recursive 2>&1; then
      echo "[$(ts)] done (exit_code=${EXIT_CODE})"
      exit 0
    else
      echo "[$(ts)] ERROR: s3 upload failed"
      exit 1
    fi
{{- end }}
