{{- if .Values.platformApi.zoa.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: zoa-job-config
  namespace: {{ .Values.platformApi.namespace }}
  labels:
    app: {{ .Values.platformApi.app.name }}
    component: zoa
data:
  image: {{ .Values.platformApi.zoa.jobImage | quote }}
  revision: {{ .Values.global.git_revision | default "unknown" | quote }}
  cpu_request: {{ .Values.platformApi.zoa.jobResources.requests.cpu | quote }}
  memory_request: {{ .Values.platformApi.zoa.jobResources.requests.memory | quote }}
  cpu_limit: {{ .Values.platformApi.zoa.jobResources.limits.cpu | quote }}
  memory_limit: {{ .Values.platformApi.zoa.jobResources.limits.memory | quote }}
  ttl_seconds: {{ .Values.platformApi.zoa.ttlSeconds | quote }}
  execution_timeout_seconds: {{ .Values.platformApi.zoa.executionTimeoutSeconds | default "1800" | quote }}
  upload_timeout_seconds: {{ .Values.platformApi.zoa.uploadTimeoutSeconds | default "120" | quote }}
  entrypoint.sh: |
    #!/bin/bash
    set -uo pipefail

    EXEC_LOG="/artifacts/execution.log"

    run_action() {
      echo "[zoa] execution_id=${RUN_ID} action=${ACTION_NAME} target=${CLUSTER_ID}"
      echo "[zoa] operator=${OPERATOR} scope=${SCOPE} type=${TYPE}"
      echo "[zoa] revision=${REVISION}"
      echo "[zoa] started_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
      echo "---"
      /zoa/run.sh
    }

    run_action 2>&1 | tee "$EXEC_LOG"
    EXIT_CODE=${PIPESTATUS[0]}

    echo "[zoa] exit_code=${EXIT_CODE}"
    echo "[zoa] completed_at=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"

    OUTPUT_CM="${OUTPUT_CONFIGMAP:-}"
    if [ -z "${OUTPUT_CM}" ]; then
      echo "[zoa] ERROR: OUTPUT_CONFIGMAP not set, cannot store output"
      exit ${EXIT_CODE}
    fi

    echo "[zoa] Writing output to ConfigMap ${OUTPUT_CM}"

    PATCH_DATA="{\"data\":{\"execution.log\":$(cat "$EXEC_LOG" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')"

    if [ -f /artifacts/output.json ]; then
      PATCH_DATA="${PATCH_DATA},\"output.json\":$(cat /artifacts/output.json | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')"
    fi

    PATCH_DATA="${PATCH_DATA},\"exit-code\":\"${EXIT_CODE}\"}}"

    if kubectl patch configmap "${OUTPUT_CM}" -n "${JOB_NAMESPACE}" --type=merge -p "${PATCH_DATA}" 2>&1; then
      echo "[zoa] Output written to ConfigMap"
    else
      echo "[zoa] ERROR: failed to patch ConfigMap"
    fi

    exit ${EXIT_CODE}
  upload_entrypoint.sh: |
    #!/bin/bash
    set -uo pipefail

    TIMEOUT="${UPLOAD_TIMEOUT:-120}"
    RUNNER_JOB="${RUNNER_JOB_NAME}"
    OUTPUT_CM="${OUTPUT_CONFIGMAP}"
    BUCKET="${ARTIFACT_BUCKET}"
    NS="${JOB_NAMESPACE}"

    echo "[zoa-upload] Waiting for runner job ${RUNNER_JOB} to complete (timeout=${TIMEOUT}s)"

    if ! kubectl wait --for=condition=complete --timeout="${TIMEOUT}s" "job/${RUNNER_JOB}" -n "${NS}" 2>/dev/null; then
      kubectl wait --for=condition=failed --timeout=10s "job/${RUNNER_JOB}" -n "${NS}" 2>/dev/null || true
    fi

    echo "[zoa-upload] Runner job finished, reading output from ConfigMap ${OUTPUT_CM}"

    CM_JSON=$(kubectl get configmap "${OUTPUT_CM}" -n "${NS}" -o json 2>&1)
    if [ $? -ne 0 ]; then
      echo "[zoa-upload] ERROR: failed to read ConfigMap"
      exit 1
    fi

    EXIT_CODE=$(printf '%s' "${CM_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('exit-code','1'))")

    HAS_OUTPUT=$(printf '%s' "${CM_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('yes' if 'output.json' in d.get('data',{}) else 'no')")
    HAS_LOG=$(printf '%s' "${CM_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print('yes' if 'execution.log' in d.get('data',{}) else 'no')")

    if [ "${HAS_LOG}" = "no" ] && [ "${HAS_OUTPUT}" = "no" ]; then
      echo "[zoa-upload] ERROR: ConfigMap has no data — runner likely crashed before writing output"
      exit 1
    fi

    UPLOAD_FAILED=0

    if [ "${HAS_LOG}" = "yes" ]; then
      printf '%s' "${CM_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['execution.log'], end='')" > /tmp/execution.log
      if ! aws s3 cp /tmp/execution.log "s3://${BUCKET}/${RUN_ID}/execution.log" 2>&1; then
        echo "[zoa-upload] ERROR: failed to upload execution.log"
        UPLOAD_FAILED=1
      fi
    fi

    if [ "${HAS_OUTPUT}" = "yes" ]; then
      printf '%s' "${CM_JSON}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data']['output.json'], end='')" > /tmp/output.json
      if ! aws s3 cp /tmp/output.json "s3://${BUCKET}/${RUN_ID}/output.json" 2>&1; then
        echo "[zoa-upload] ERROR: failed to upload output.json"
        UPLOAD_FAILED=1
      fi
    fi

    if [ $UPLOAD_FAILED -eq 0 ]; then
      echo "[zoa-upload] Upload complete"
    else
      echo "[zoa-upload] Upload FAILED"
      exit 1
    fi
{{- end }}
