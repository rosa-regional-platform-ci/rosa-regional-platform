name: get_services
profile: kube
scope: kube-api
type: read
description: List services with type, cluster IP, ports, and selector
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List across all namespaces (overrides namespace)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["services"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get services "${NAMESPACE_ARGS[@]}" "${SELECTOR_ARGS[@]}" -o json > /tmp/raw.json

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/raw.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      namespace: .metadata.namespace,
      type: .spec.type,
      cluster_ip: .spec.clusterIP,
      external_ip: (if .status.loadBalancer.ingress then [.status.loadBalancer.ingress[] | (.ip // .hostname)] | join(",") elif .spec.externalIPs then .spec.externalIPs | join(",") else "<none>" end),
      ports: ([.spec.ports[] | ((.port | tostring) + "/" + .protocol + (if .nodePort then ":" + (.nodePort | tostring) else "" end))] | join(",")),
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      selector: (if .spec.selector then (.spec.selector | to_entries | map(.key + "=" + .value) | join(",")) else "<none>" end)
    }]' /tmp/raw.json > /artifacts/output.json
  fi
  echo "Services retrieved successfully"
