name: rollout_restart
profile: kube
scope: kube-api
type: write
description: Perform a rolling restart of a deployment and wait for completion
params:
  - name: namespace
    required: true
    description: "Namespace of the deployment"
  - name: deployment_name
    required: true
    description: "Name of the deployment to restart"
rbac:
  cluster_scoped: false
  namespace_param: namespace
  rules:
    - apiGroups: ["apps"]
      resources: ["deployments"]
      verbs: ["get", "patch"]
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list"]
script: |
  echo "Validating deployment exists: ${PARAM_DEPLOYMENT_NAME} in ${PARAM_NAMESPACE}"
  if ! kubectl get deployment "${PARAM_DEPLOYMENT_NAME}" -n "${PARAM_NAMESPACE}" &>/dev/null; then
    echo '{"error": "Deployment not found"}' > /artifacts/output.json
    exit 1
  fi

  REPLICAS=$(kubectl get deployment "${PARAM_DEPLOYMENT_NAME}" -n "${PARAM_NAMESPACE}" -o jsonpath='{.spec.replicas}')
  if [ "${REPLICAS}" = "0" ]; then
    echo '{"error": "Deployment has 0 replicas, nothing to restart"}' > /artifacts/output.json
    exit 1
  fi

  echo "Rolling restart deployment: ${PARAM_DEPLOYMENT_NAME} in namespace: ${PARAM_NAMESPACE}"
  kubectl rollout restart "deployment/${PARAM_DEPLOYMENT_NAME}" -n "${PARAM_NAMESPACE}"

  echo "Waiting for rollout to complete..."
  kubectl rollout status "deployment/${PARAM_DEPLOYMENT_NAME}" -n "${PARAM_NAMESPACE}" --timeout=300s

  kubectl get deployment "${PARAM_DEPLOYMENT_NAME}" -n "${PARAM_NAMESPACE}" -o json > /artifacts/output.json

  echo '{"affected_resources": [{"kind": "Deployment", "namespace": "'"${PARAM_NAMESPACE}"'", "name": "'"${PARAM_DEPLOYMENT_NAME}"'", "action": "restarted"}], "summary": "Rollout restart completed successfully"}' > /artifacts/output.json
  echo "Rollout restart completed successfully"
