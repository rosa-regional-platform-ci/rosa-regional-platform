name: get_nodes
profile: kube
scope: kube-api
type: read
description: List all nodes in the target cluster with status and resource information
timeout_seconds: 300
params:
  - name: node_selector
    required: false
    default: ""
    description: "Label selector to filter nodes (e.g. node-role.kubernetes.io/worker=)"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["nodes"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  SELECTOR_ARGS=()
  if [ -n "${PARAM_NODE_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_NODE_SELECTOR}")
  fi

  echo "Retrieving nodes..."
  kubectl get nodes "${SELECTOR_ARGS[@]}" -o wide

  kubectl get nodes "${SELECTOR_ARGS[@]}" -o json > /artifacts/output.json
  echo "Nodes retrieved successfully"
