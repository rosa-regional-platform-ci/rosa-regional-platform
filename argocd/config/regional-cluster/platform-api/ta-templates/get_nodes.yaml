name: get_nodes
profile: kube
scope: kube-api
type: read
description: List all nodes in the target cluster with status and resource information
params:
  - name: node_selector
    required: false
    default: ""
    description: "Label selector to filter nodes (e.g. node-role.kubernetes.io/worker=)"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["nodes"]
      verbs: ["get", "list"]
script: |
  ARGS=""
  if [ -n "${PARAM_NODE_SELECTOR}" ]; then
    ARGS="-l ${PARAM_NODE_SELECTOR}"
  fi

  echo "Retrieving nodes..."
  kubectl get nodes ${ARGS} -o wide

  kubectl get nodes ${ARGS} -o json > /artifacts/output.json
  echo "Nodes retrieved successfully"
