name: get_resource
profile: kube
scope: kube-api
type: read
description: Generic kubectl get for any resource type, with namespace support and secrets protection for HCP namespaces
timeout_seconds: 300
params:
  - name: resource
    required: true
    description: "Resource type to get (e.g. deployments, services, hostedclusters, configmaps)"
  - name: namespace
    required: false
    default: ""
    description: "Namespace for namespace-scoped resources (omit for cluster-scoped)"
  - name: name
    required: false
    default: ""
    description: "Specific resource name (omit to list all)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter resources (e.g. app=maestro)"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: ["*"]
      resources: ["*"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  RESOURCE="${PARAM_RESOURCE}"
  NAMESPACE="${PARAM_NAMESPACE:-}"
  NAME="${PARAM_NAME:-}"
  LABEL_SELECTOR="${PARAM_LABEL_SELECTOR:-}"

  BLOCKED_PREFIXES="clusters-"

  if echo "${RESOURCE}" | grep -iq "^secret"; then
    if [ -n "${NAMESPACE}" ] && echo "${NAMESPACE}" | grep -q "^${BLOCKED_PREFIXES}"; then
      echo "ERROR: Access to secrets in HCP namespaces (${NAMESPACE}) is denied"
      exit 1
    fi
  fi

  ARGS=("${RESOURCE}")

  if [ -n "${NAME}" ]; then
    ARGS+=("${NAME}")
  fi

  if [ -n "${NAMESPACE}" ]; then
    ARGS+=(-n "${NAMESPACE}")
  fi

  if [ -n "${LABEL_SELECTOR}" ]; then
    ARGS+=(-l "${LABEL_SELECTOR}")
  fi

  echo "Running: kubectl get ${ARGS[*]} -o json"
  kubectl get "${ARGS[@]}" -o json > /artifacts/output.json
  echo "Done"
