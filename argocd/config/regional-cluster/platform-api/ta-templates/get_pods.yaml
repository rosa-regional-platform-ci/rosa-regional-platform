name: get_pods
profile: kube
scope: kube-api
type: read
description: List pods in a namespace with optional label selector and status details
params:
  - name: namespace
    required: true
    description: "Target namespace to list pods from"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter pods (e.g. app=maestro)"
rbac:
  cluster_scoped: false
  namespace_param: namespace
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["get", "list"]
script: |
  ARGS="-n ${PARAM_NAMESPACE}"
  if [ -n "${PARAM_LABEL_SELECTOR}" ]; then
    ARGS="${ARGS} -l ${PARAM_LABEL_SELECTOR}"
  fi

  echo "Retrieving pods in namespace: ${PARAM_NAMESPACE}"
  kubectl get pods ${ARGS} -o wide

  kubectl get pods ${ARGS} -o json > /artifacts/output.json
  echo "Pods retrieved successfully"
