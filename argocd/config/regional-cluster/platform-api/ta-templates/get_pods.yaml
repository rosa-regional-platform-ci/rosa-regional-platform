name: get_pods
profile: kube
scope: kube-api
type: read
description: List pods in a namespace or across all namespaces with optional label selector
timeout_seconds: 300
params:
  - name: namespace
    required: false
    default: ""
    description: "Target namespace to list pods from"
  - name: all_namespaces
    required: false
    default: "false"
    description: "List pods across all namespaces (overrides namespace)"
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter pods (e.g. app=maestro)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["pods"]
      verbs: ["get", "list"]
    - apiGroups: [""]
      resources: ["events"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  NAMESPACE_ARGS=()
  if [ "${PARAM_ALL_NAMESPACES:-false}" = "true" ]; then
    if [ -n "${PARAM_NAMESPACE:-}" ]; then
      echo "WARNING: all_namespaces=true overrides namespace=${PARAM_NAMESPACE}"
    fi
    NAMESPACE_ARGS=(--all-namespaces)
    echo "Retrieving pods across all namespaces"
  elif [ -n "${PARAM_NAMESPACE:-}" ]; then
    NAMESPACE_ARGS=(-n "${PARAM_NAMESPACE}")
    echo "Retrieving pods in namespace: ${PARAM_NAMESPACE}"
  else
    echo "ERROR: Specify namespace or set all_namespaces=true"
    exit 1
  fi

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  kubectl get pods "${NAMESPACE_ARGS[@]}" "${SELECTOR_ARGS[@]}" -o json > /tmp/raw.json

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/raw.json /artifacts/output.json
  else
    jq '{
      summary: (.items | length | tostring) + " pods, " + ([.items[] | select(.status.phase=="Running")] | length | tostring) + " Running, " + ([.items[] | select(.status.phase!="Running" and .status.phase!="Succeeded")] | length | tostring) + " unhealthy",
      pods: [.items[] | {
        name: .metadata.name,
        namespace: .metadata.namespace,
        status: .status.phase,
        ready: (if .status.containerStatuses then ([.status.containerStatuses[] | select(.ready==true)] | length | tostring) + "/" + (.status.containerStatuses | length | tostring) else "0/0" end),
        restarts: (if .status.containerStatuses then [.status.containerStatuses[].restartCount] | add else 0 end),
        node: .spec.nodeName,
        created: .metadata.creationTimestamp
      }]
    }' /tmp/raw.json > /artifacts/output.json
  fi
  echo "Pods retrieved successfully"
