name: get_namespaces
scope: kube-api
type: read
description: List all namespaces in the target cluster
timeout_seconds: 300
params:
  - name: label_selector
    required: false
    default: ""
    description: "Label selector to filter namespaces (e.g. kubernetes.io/metadata.name=openshift-monitoring)"
  - name: verbose
    required: false
    default: "false"
    description: "Return full JSON output instead of compact summary"
rbac:
  cluster_scoped: true
  rules:
    - apiGroups: [""]
      resources: ["namespaces"]
      verbs: ["get", "list"]
script: |
  set -euo pipefail

  SELECTOR_ARGS=()
  if [ -n "${PARAM_LABEL_SELECTOR:-}" ]; then
    SELECTOR_ARGS=(-l "${PARAM_LABEL_SELECTOR}")
  fi

  echo "Retrieving namespaces..."
  kubectl get namespaces "${SELECTOR_ARGS[@]}" -o json > /tmp/raw.json

  if [ "${PARAM_VERBOSE:-false}" = "true" ]; then
    cp /tmp/raw.json /artifacts/output.json
  else
    jq '[.items[] | {
      name: .metadata.name,
      status: .status.phase,
      age: ((now - (.metadata.creationTimestamp | fromdateiso8601)) | if . >= 86400 then (. / 86400 | floor | tostring) + "d" elif . >= 3600 then (. / 3600 | floor | tostring) + "h" elif . >= 60 then (. / 60 | floor | tostring) + "m" else (. | floor | tostring) + "s" end),
      labels: .metadata.labels
    }]' /tmp/raw.json > /artifacts/output.json
  fi
  echo "Namespaces retrieved successfully"
