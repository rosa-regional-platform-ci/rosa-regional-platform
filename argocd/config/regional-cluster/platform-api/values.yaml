platformApi:
  namespace: platform-api
  serviceAccount:
    create: true
    name: platform-api-sa
    annotations: {}
  app:
    name: platform-api
    image:
      repository: quay.io/rrp-dev-ci/rosa-regional-platform-api
      tag: ci-44-2037793424672821248
      pullPolicy: Always
    args:
      logLevel: info
      logFormat: json
      maestroUrl: http://maestro-http.maestro-server:8080
      allowedAccounts: '123456789012'
      dynamodbRegion: us-east-2
      dynamodbPrefix: rosa
      apiPort: 8000
      healthPort: 8081
      metricsPort: 9090
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi
  envoy:
    image:
      repository: envoyproxy/envoy
      tag: v1.31-latest
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi
  deployment:
    replicas: 2
  service:
    type: ClusterIP
    ports:
      http: 8080
      api: 8000
      health: 8081
      metrics: 9090
  targetGroup:
    arn: PLACEHOLDER
    targetType: ip
  probes:
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
