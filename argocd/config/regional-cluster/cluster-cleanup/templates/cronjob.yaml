apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-cleanup
  namespace: {{ .Values.clusterCleanup.namespace }}
spec:
  schedule: {{ .Values.clusterCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: hyperfleet-api-sa
          containers:
            - name: cleanup
              image: {{ .Values.clusterCleanup.image.repository }}:{{ .Values.clusterCleanup.image.tag }}
              env:
                - name: MAX_AGE_HOURS
                  value: {{ .Values.clusterCleanup.maxAgeHours | quote }}
                - name: MAESTRO_NS
                  value: {{ .Values.clusterCleanup.maestroNamespace }}
                - name: MAESTRO_URL
                  value: {{ .Values.clusterCleanup.maestroRestUrl }}
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.password
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.port
                - name: PGDATABASE
                  value: hyperfleet
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  # Install kubectl
                  wget -qO /usr/local/bin/kubectl "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
                  chmod +x /usr/local/bin/kubectl

                  echo "=== Cluster Cleanup - $(date -u) ==="

                  # Find a maestro pod for CLI exec
                  maestro_exec() {
                    kubectl exec -n "$MAESTRO_NS" "$MAESTRO_POD" -c service -- /usr/local/bin/maestro "$@"
                  }
                  MAESTRO_POD=$(kubectl get pod -n "$MAESTRO_NS" -l app=maestro,component=maestro-server \
                    --field-selector=status.phase=Running -o jsonpath='{.items[0].metadata.name}')
                  echo "Using maestro pod: $MAESTRO_POD"

                  # Delete ALL resource bundles
                  echo "Listing all bundles from $MAESTRO_URL"
                  ALL_IDS=$(maestro_exec resourcebundle list --rest-url="$MAESTRO_URL" --size=200 -o json 2>/dev/null \
                    | grep -o '"href": "/api/maestro/v1/resource-bundles/[^"]*"' \
                    | sed 's|.*/||;s|"||g')
                  echo "Found bundle IDs: $(echo $ALL_IDS | tr '\n' ' ')"

                  DELETED_COUNT=0
                  for bid in $ALL_IDS; do
                    echo "Deleting bundle: $bid"
                    maestro_exec resourcebundle delete "$bid" -y --rest-url="$MAESTRO_URL" 2>&1 || echo "  WARN: failed to delete $bid"
                    DELETED_COUNT=$((DELETED_COUNT + 1))
                  done
                  echo "Deleted $DELETED_COUNT resource bundle(s)"

                  echo "=== Cleanup complete ==="
              resources:
                requests:
                  cpu: {{ .Values.clusterCleanup.resources.requests.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.clusterCleanup.resources.limits.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.limits.memory }}
