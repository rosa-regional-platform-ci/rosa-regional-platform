apiVersion: batch/v1
kind: CronJob
metadata:
  name: cluster-cleanup
  namespace: {{ .Values.clusterCleanup.namespace }}
spec:
  schedule: {{ .Values.clusterCleanup.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 600
      backoffLimit: 1
      template:
        spec:
          restartPolicy: Never
          serviceAccountName: hyperfleet-api-sa
          containers:
            - name: cleanup
              image: {{ .Values.clusterCleanup.image.repository }}:{{ .Values.clusterCleanup.image.tag }}
              env:
                - name: MAX_AGE_HOURS
                  value: {{ .Values.clusterCleanup.maxAgeHours | quote }}
                - name: PLATFORM_API_URL
                  value: {{ .Values.clusterCleanup.platformApiUrl }}
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.user
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.password
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.host
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.clusterCleanup.dbSecretName }}
                      key: db.port
                - name: PGDATABASE
                  value: hyperfleet
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  echo "=== Cluster Cleanup - $(date -u) ==="
                  echo "Removing clusters older than ${MAX_AGE_HOURS} hours"

                  # Find clusters older than MAX_AGE_HOURS
                  STALE_CLUSTERS=$(psql -tAF'|' -c "
                    SELECT id, name
                    FROM clusters
                    WHERE deleted_at IS NULL
                      AND created_time < NOW() - INTERVAL '${MAX_AGE_HOURS} hours';
                  ")

                  if [ -z "$STALE_CLUSTERS" ]; then
                    echo "No stale clusters found. Nothing to do."
                    exit 0
                  fi

                  echo "Found stale clusters:"
                  echo "$STALE_CLUSTERS" | while IFS='|' read -r id name; do
                    echo "  - $name ($id)"
                  done

                  # Delete each cluster from the database and clean up resource bundles
                  echo "$STALE_CLUSTERS" | while IFS='|' read -r id name; do
                    echo ""
                    echo "--- Cleaning up cluster: $name ($id) ---"

                    # Step 1: Delete from clusters table
                    psql -c "DELETE FROM clusters WHERE id = '$id';"
                    echo "Deleted from clusters table"

                    # Step 2: Delete from adapter_statuses table
                    psql -c "DELETE FROM adapter_statuses WHERE resource_id = '$id';" 2>/dev/null || true
                    echo "Deleted from adapter_statuses table"

                    # Step 3: Delete resource bundles via Platform API
                    echo "Cleaning up resource bundles..."
                    for page in $(seq 1 10); do
                      RESP=$(wget -qO- "${PLATFORM_API_URL}/api/v0/resource_bundles?page=${page}&size=100" 2>/dev/null) || break
                      BUNDLE_IDS=$(echo "$RESP" | sed -n 's/.*"id":"\([^"]*\)".*"name":"[^"]*'"$id"'[^"]*".*/\1/p')
                      for bid in $BUNDLE_IDS; do
                        echo "  Deleting bundle: $bid"
                        wget -qO- --method=DELETE "${PLATFORM_API_URL}/api/v0/resource_bundles/$bid" 2>/dev/null || true
                      done
                    done
                    echo "Done cleaning up cluster: $name"
                  done

                  echo ""
                  echo "=== Cleanup complete ==="
                  REMAINING=$(psql -tA -c "SELECT COUNT(*) FROM clusters WHERE deleted_at IS NULL;")
                  echo "Remaining active clusters: $REMAINING"
              resources:
                requests:
                  cpu: {{ .Values.clusterCleanup.resources.requests.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.requests.memory }}
                limits:
                  cpu: {{ .Values.clusterCleanup.resources.limits.cpu }}
                  memory: {{ .Values.clusterCleanup.resources.limits.memory }}
