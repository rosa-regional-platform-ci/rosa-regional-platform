clusterCleanup:
  namespace: hyperfleet-system

  schedule: "0 */6 * * *"

  image:
    repository: postgres
    tag: "16-alpine"

  # Maximum age in hours before a cluster is cleaned up
  maxAgeHours: 24

  # Platform API internal service URL for resource bundle cleanup
  platformApiUrl: http://platform-api.platform-api.svc.cluster.local:8000

  # Database secret (created by hyperfleet-api SecretProviderClass)
  dbSecretName: hyperfleet-api-db-credentials

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
