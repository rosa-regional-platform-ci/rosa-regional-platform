apiVersion: v1
kind: Service
metadata:
  name: {{ include "thanos-receive.name" . }}
  namespace: {{ .Values.thanosReceive.namespace }}
  labels:
    {{- include "thanos-receive.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: {{ include "thanos-receive.name" . }}
  ports:
    - name: remote-write
      port: 19291
      targetPort: remote-write
    - name: grpc
      port: 10901
      targetPort: grpc
    - name: http
      port: 10902
      targetPort: http
