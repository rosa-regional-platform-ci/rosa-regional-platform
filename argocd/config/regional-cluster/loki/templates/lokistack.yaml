{{- if .Values.global.cluster_name }}
apiVersion: loki.grafana.com/v1
kind: LokiStack
metadata:
  name: {{ .Values.lokiStack.name }}
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
spec:
  size: {{ .Values.lokiStack.size }}
  managementState: {{ .Values.lokiStack.managementState | default "Managed" }}
  storage:
    schemas:
      - version: {{ .Values.lokiStack.storageSchemaVersion }}
        effectiveDate: "2024-10-01"
    secret:
      name: loki-storage-config
      type: s3
  storageClassName: {{ .Values.lokiStack.storageClassName | default "gp3" }}
  limits:
    global:
      ingestion:
        ingestionBurstSize: {{ .Values.lokiStack.ingestion.ingestionBurstSize }}
        ingestionRate: {{ .Values.lokiStack.ingestion.ingestionRate }}
        maxLineSize: {{ .Values.lokiStack.ingestion.maxLineSize }}
        perStreamRateLimit: {{ .Values.lokiStack.ingestion.perStreamRateLimit }}
        perStreamRateLimitBurst: {{ .Values.lokiStack.ingestion.perStreamRateLimitBurst }}
      otlp:
        streamLabels:
          resourceAttributes:
          {{- range .Values.lokiStack.otlp.streamLabels.resourceAttributes }}
          - name: {{ .name }}
          {{- end }}
      queries:
        queryTimeout: {{ .Values.lokiStack.queries.queryTimeout }}
      retention:
        days: {{ .Values.lokiStack.retention.days }}
  rules:
    enabled: {{ .Values.lokiStack.rules.enabled }}
  template:
    distributor:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/component: distributor
                app.kubernetes.io/created-by: {{ .Values.lokiStack.name }}
            topologyKey: kubernetes.io/hostname
      replicas: {{ .Values.lokiStack.template.distributor.replicas }}
    ingester:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app.kubernetes.io/component: ingester
                app.kubernetes.io/created-by: {{ .Values.lokiStack.name }}
            topologyKey: kubernetes.io/hostname
      replicas: {{ .Values.lokiStack.template.ingester.replicas }}
    querier:
      replicas: {{ .Values.lokiStack.template.querier.replicas }}
    queryFrontend:
      replicas: {{ .Values.lokiStack.template.queryFrontend.replicas }}
{{- end }}
