{{- if .Values.loki.distributorTargetGroup.arn }}
apiVersion: eks.amazonaws.com/v1
kind: TargetGroupBinding
metadata:
  name: loki-distributor
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
spec:
  serviceRef:
    name: {{ .Values.loki.distributorTargetGroup.serviceName | default "loki-distributor-http" }}
    port: {{ .Values.loki.distributorTargetGroup.port | default 3100 }}
  targetGroupARN: {{ .Values.loki.distributorTargetGroup.arn | quote }}
  targetType: {{ .Values.loki.distributorTargetGroup.targetType | default "ip" }}
{{- end }}
---
{{- if .Values.loki.queryFrontendTargetGroup.arn }}
apiVersion: eks.amazonaws.com/v1
kind: TargetGroupBinding
metadata:
  name: loki-query-frontend
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
spec:
  serviceRef:
    name: {{ .Values.loki.queryFrontendTargetGroup.serviceName | default "loki-query-frontend-http" }}
    port: {{ .Values.loki.queryFrontendTargetGroup.port | default 3100 }}
  targetGroupARN: {{ .Values.loki.queryFrontendTargetGroup.arn | quote }}
  targetType: {{ .Values.loki.queryFrontendTargetGroup.targetType | default "ip" }}
{{- end }}
