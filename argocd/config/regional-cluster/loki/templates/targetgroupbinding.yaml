{{- if .Values.platform.writeTargetGroup.arn }}
apiVersion: eks.amazonaws.com/v1
kind: TargetGroupBinding
metadata:
  name: loki-write
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
spec:
  serviceRef:
    name: {{ .Values.platform.writeTargetGroup.serviceName | default "loki-write" }}
    port: {{ .Values.platform.writeTargetGroup.port | default 3100 }}
  targetGroupARN: {{ .Values.platform.writeTargetGroup.arn | quote }}
  targetType: {{ .Values.platform.writeTargetGroup.targetType | default "ip" }}
{{- end }}
---
{{- if .Values.platform.readTargetGroup.arn }}
apiVersion: eks.amazonaws.com/v1
kind: TargetGroupBinding
metadata:
  name: loki-read
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
spec:
  serviceRef:
    name: {{ .Values.platform.readTargetGroup.serviceName | default "loki-read" }}
    port: {{ .Values.platform.readTargetGroup.port | default 3100 }}
  targetGroupARN: {{ .Values.platform.readTargetGroup.arn | quote }}
  targetType: {{ .Values.platform.readTargetGroup.targetType | default "ip" }}
{{- end }}
