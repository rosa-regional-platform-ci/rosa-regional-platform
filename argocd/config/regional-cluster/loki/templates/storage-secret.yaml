{{- if .Values.global.cluster_name }}
apiVersion: v1
kind: Secret
metadata:
  name: loki-storage-config
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
type: Opaque
stringData:
  bucketnames: {{ printf "%s-loki-logs-%s" .Values.global.cluster_name .Values.global.aws_account_id | quote }}
  endpoint: {{ if hasPrefix "us-" .Values.global.aws_region }}{{ printf "s3-fips.%s.amazonaws.com" .Values.global.aws_region | quote }}{{ else }}{{ printf "s3.%s.amazonaws.com" .Values.global.aws_region | quote }}{{ end }}
  region: {{ .Values.global.aws_region | quote }}
  {{- if .Values.loki.kmsKeyArn }}
  sse_type: "SSE-KMS"
  sse_kms_key_id: {{ .Values.loki.kmsKeyArn | quote }}
  {{- end }}
{{- end }}
