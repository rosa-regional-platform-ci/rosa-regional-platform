{{- if .Values.global.cluster_name }}
apiVersion: v1
kind: Secret
metadata:
  name: loki-storage-config
  namespace: {{ include "loki.namespace" . }}
  labels:
    {{- include "loki.labels" . | nindent 4 }}
  annotations:
    {{- include "loki.annotations" . | nindent 4 }}
type: Opaque
stringData:
  bucketnames: {{ printf "%s-loki-logs-%s" .Values.global.cluster_name .Values.global.aws_account_id | quote }}
  region: {{ .Values.global.aws_region | quote }}
  # STS mode: the operator detects role_arn and switches to short-lived token auth.
  # Actual credentials are provided by EKS Pod Identity (transparent to the app via
  # AWS SDK env vars), but the operator requires role_arn to pass secret validation.
  role_arn: {{ .Values.loki.writerRoleArn | quote }}
  {{- if .Values.loki.kmsKeyArn }}
  sse_type: "SSE-KMS"
  sse_kms_key_id: {{ .Values.loki.kmsKeyArn | quote }}
  {{- end }}
{{- end }}
