# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""
  aws_account_id: ""

# Platform-level values consumed by our wrapper templates (targetgroupbinding, serviceaccount, etc.)
# Separate from the "loki:" key which is reserved for the grafana/loki subchart.
platform:
  # KMS key ARN for client-side SSE-KMS (defense-in-depth, matches Thanos pattern).
  # Injected at runtime by the ApplicationSet from loki_kms_key_arn annotation.
  kmsKeyArn: ""
  distributorTargetGroup:
    arn: ""
    # In SimpleScalable mode, the write target handles distribution.
    # The chart creates a service named "<release>-loki-write".
    serviceName: loki-loki-write
    port: 3100
    targetType: ip
  queryFrontendTargetGroup:
    arn: ""
    # In SimpleScalable mode, the read target handles queries.
    # The chart creates a service named "<release>-loki-read".
    serviceName: loki-loki-read
    port: 3100
    targetType: ip

serviceAccount:
  name: loki
  annotations: {}

# =====================================================================
# grafana/loki subchart values
# Translates RHOBS LokiStack CR into direct Loki config.
# See PLAN-loki-direct-helm-chart.md for full field-by-field mapping.
# =====================================================================
loki:
  # SimpleScalable: 3 targets (write, read, backend) instead of 7+ microservices.
  # Recommended by Grafana for installs up to ~1TB/day.
  deploymentMode: SimpleScalable

  loki:
    # Single tenant — no gateway or multi-tenancy needed.
    auth_enabled: false

    commonConfig:
      path_prefix: /var/loki
      # IMPORTANT: replication_factor must be <= write.replicas.
      # Ephemeral (1 replica): RF=1. Production (3 replicas): RF=2.
      # Override via env-overlay argocd-values-regional-cluster.yaml.
      replication_factor: 1

    # Maps to: spec.storage.schemas[0]
    schemaConfig:
      configs:
        - from: "2025-06-06"      # spec.storage.schemas[0].effectiveDate
          store: tsdb
          object_store: s3
          schema: v13             # spec.storage.schemas[0].version
          index:
            prefix: index_
            period: 24h

    # Maps to: spec.storage.secret (type: s3)
    # S3 auth is via EKS Pod Identity (transparent via AWS SDK env vars).
    # No explicit credentials needed — the ServiceAccount IRSA annotation handles it.
    storage:
      type: s3                    # spec.storage.secret.type
      s3:
        region: ""                # templated from global.aws_region
        s3ForcePathStyle: false
        # Client-side SSE-KMS (defense-in-depth, matches Thanos sse_config pattern).
        # The S3 bucket also has default SSE-KMS encryption; this ensures every
        # PutObject request explicitly includes the x-amz-server-side-encryption header.
        # kms_key_id is injected at runtime by ApplicationSet valuesObject merge.
        sse:
          type: SSE-KMS
          kms_key_id: ""
      bucketNames:
        chunks: ""                # templated: <cluster_name>-loki-logs-<account_id>
        ruler: ""                 # same bucket (ruler disabled)

    # Maps to: spec.limits.global
    # Aligned with RHOBS staging baseline.
    # Production uses higher values (ingestionRate: 250, perStreamRateLimit: 240).
    limits_config:
      ingestion_rate_mb: 20                 # spec.limits.global.ingestion.ingestionRate
      ingestion_burst_size_mb: 256          # spec.limits.global.ingestion.ingestionBurstSize
      max_line_size: 2097152                # spec.limits.global.ingestion.maxLineSize (2MB)
      per_stream_rate_limit: 15MB           # spec.limits.global.ingestion.perStreamRateLimit
      per_stream_rate_limit_burst: 30MB     # spec.limits.global.ingestion.perStreamRateLimitBurst
      query_timeout: 5m                     # spec.limits.global.queries.queryTimeout
      retention_period: 2160h               # spec.limits.global.retention.days: 90 (90*24h)
      reject_old_samples: true
      reject_old_samples_max_age: 168h
      split_queries_by_interval: 15m
      volume_enabled: true

    # Required for retention_period to take effect
    compactor:
      retention_enabled: true
      delete_request_store: s3

    server:
      http_listen_port: 3100
      grpc_listen_port: 9095
      http_server_read_timeout: 600s
      http_server_write_timeout: 600s

  # --- write (distributor + ingester) ---
  # RHOBS production: distributor: 3, ingester: 3
  write:
    replicas: 1  # production: 3
    # Operator 1x.extra-small: distributor (1 CPU, 1Gi) + ingester (2 CPU, 8Gi)
    # Combined baseline for the merged write target.
    resources:
      requests:
        cpu: "2"
        memory: 5Gi
      limits:
        memory: 8Gi
    persistence:
      size: 10Gi                  # operator ingester PVC size
      storageClass: gp3           # spec.storageClassName: gp3-csi (EKS equivalent)
    # Standard hostname + zone anti-affinity (same pattern as HyperShift operators)
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: write
              topologyKey: kubernetes.io/hostname
          - weight: 99
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: write
              topologyKey: topology.kubernetes.io/zone

  # --- read (querier + query-frontend) ---
  # RHOBS production: querier: 2, queryFrontend: 2
  read:
    replicas: 1  # production: 2
    # Operator 1x.extra-small: querier (1.5 CPU, 3Gi) + query-frontend (1 CPU, 1Gi)
    resources:
      requests:
        cpu: "1500m"
        memory: 2Gi
      limits:
        memory: 4Gi
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: read
              topologyKey: kubernetes.io/hostname
          - weight: 99
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: read
              topologyKey: topology.kubernetes.io/zone

  # --- backend (compactor + index-gateway) ---
  # Ruler disabled via ruler.enabled: false below
  backend:
    replicas: 1  # production: 2
    # Operator 1x.extra-small: compactor (1 CPU, 2Gi) + indexGateway (500m, 1Gi)
    resources:
      requests:
        cpu: "1"
        memory: 2Gi
      limits:
        memory: 4Gi
    persistence:
      size: 10Gi                  # operator compactor PVC size
      storageClass: gp3
    affinity:
      podAntiAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: backend
              topologyKey: kubernetes.io/hostname
          - weight: 99
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/component: backend
              topologyKey: topology.kubernetes.io/zone

  # We manage the SA ourselves (with IRSA annotation) via serviceaccount.yaml.
  # The chart must know the SA name to mount it on pods.
  serviceAccount:
    create: false
    name: loki

  # --- Monitoring ---
  # Loki exposes Prometheus metrics on /metrics (port http-metrics).
  # The chart creates ServiceMonitor resources that Prometheus auto-discovers
  # (monitoring stack has serviceMonitorSelectorNilUsesHelmValues: false).
  monitoring:
    serviceMonitor:
      enabled: true
      labels: {}
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false

  # --- Disabled components ---
  minio:
    enabled: false          # using real S3
  lokiCanary:
    enabled: false
  test:
    enabled: false
  gateway:
    enabled: false          # single tenant, Vector writes directly to write target
  rollout_operator:
    enabled: false
  chunksCache:
    enabled: false          # can enable later with memcached for production
  resultsCache:
    enabled: false
  ruler:
    enabled: false          # spec.rules.enabled: false
