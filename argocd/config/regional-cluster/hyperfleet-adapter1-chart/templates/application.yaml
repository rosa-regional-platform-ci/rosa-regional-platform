apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.hyperfleetAdapter1Chart.name }}
  namespace: {{ .Values.hyperfleetAdapter1Chart.namespace }}
  {{- if .Values.hyperfleetAdapter1Chart.annotations }}
  annotations:
    {{- toYaml .Values.hyperfleetAdapter1Chart.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "hyperfleet-adapter1-chart.labels" . | nindent 4 }}
spec:
  project: default
  source:
    repoURL: {{ .Values.hyperfleetAdapter1Chart.source.repoURL }}
    targetRevision: {{ .Values.hyperfleetAdapter1Chart.source.targetRevision }}
    path: {{ .Values.hyperfleetAdapter1Chart.source.path }}
    {{- if .Values.hyperfleetAdapter1Chart.values }}
    helm:
      valuesObject:
        replicaCount: 1
        image:
          registry: quay.io/openshift-hyperfleet
          repository: hyperfleet-adapter
          tag: v0.1.1
          pullPolicy: Always
        serviceAccount:
          create: true
          name: hyperfleet-adapter-sa
          annotations: {}
        broker:
          create: true
          rabbitmq:
            enabled: false
            url: "amqp://placeholder:placeholder@localhost:5672/"
            queue: "hyperfleet-clusters-landing-zone"
            exchange: "hyperfleet-clusters"
            exchangeType: "topic"
            routingKey: "#"
          external:
            enabled: true
            podidentity: true
            secretMountPath: /mnt/secrets-store
            createSecretProviderClass: true
            secretProviderClass: "hyperfleet-adapter-mq-secrets"
            aws:
              region: {{ .Values.global.aws_region }}
              secretName: "{{ .Values.global.cluster_name }}-hyperfleet-mq-credentials"
            url: ""
            exchangeType: "topic"
            queue: "hyperfleet-clusters-landing-zone"
            exchange: "hyperfleet-clusters"
            routingKey: "#"
        adapterConfig:
          create: true
          hyperfleetApi:
            baseUrl: "http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8000"
            version: "v1"
          maestro:
            # Enable Maestro client for advanced resource management
            enabled: true
            grpcServerAddress: "maestro-grpc.maestro-server.svc.cluster.local:8090"
            httpServerAddress: "http://maestro-http.maestro-server.svc.cluster.local:8080"
            sourceId: "hyperfleet-adapter"
            clientId: "hyperfleet-adapter-client"
            timeout: "30s"
            retryAttempts: 3
            retryBackoff: "exponential"
            # TLS configuration (set insecure: true for development)
            insecure: true
            auth:
              type: "none"  # Use "tls" for production with certificates
              tlsConfig:
                caFile: ""
                certFile: ""
                keyFile: ""
          log:
            level: debug
          # files: |
          #   adapter-config.yaml: {{ .Files.Get "adapter-config.yaml" | nindent 12 }}
          yaml: |
            {{ .Files.Get "adapter-config.yaml" | nindent 12 }}
        adapterTaskConfig:
          create: true
          files:
            adapter-task-config.yaml: "adapter-task-config.yaml"
            manifestwork.yaml: "adapter-task-resource-manifestwork.yaml"
        env:
          - name: SIMULATE_RESULT
            value: success
          - name: NAMESPACE
            valueFrom:
              fieldRef:
                fieldPath: metadata.namespace
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.hyperfleetAdapter1Chart.targetNamespace }}
  syncPolicy:
    {{- toYaml .Values.hyperfleetAdapter1Chart.syncPolicy | nindent 4 }}
