# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_type: ""
  environment: ""
  aws_region: ""
  cluster_name: ""

namespace: vector

image:
  repository: timberio/vector
  tag: 0.44.0-distroless-libc
  pullPolicy: IfNotPresent

# Resource limits match RHOBS CLF collector spec
resources:
  requests:
    cpu: 200m
    memory: 1Gi
  limits:
    cpu: 750m
    memory: 2Gi

# Pod-level security context
# Vector needs root to read /var/log and /var/lib/docker on host nodes.
# This matches CLO/Vector behavior on OpenShift where the collector runs privileged.
podSecurityContext:
  runAsUser: 0
  runAsGroup: 0
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
# readOnlyRootFilesystem is false because Vector writes checkpoint data to /vector-data-dir
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL
    add:
      - DAC_READ_SEARCH

# Tolerations match RHOBS CLF collector: schedule on all nodes
tolerations:
  - operator: Exists

lokiEndpoint: "http://loki-write.loki.svc:3100"
