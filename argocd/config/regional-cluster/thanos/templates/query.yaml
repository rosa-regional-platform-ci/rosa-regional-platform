{{- if .Values.thanos.query.enabled }}
apiVersion: monitoring.thanos.io/v1alpha1
kind: ThanosQuery
metadata:
  name: thanos-query
  namespace: {{ include "thanos-operator.namespace" . }}
  labels:
    {{- include "thanos-operator.labels" . | nindent 4 }}
  annotations:
    {{- include "thanos-operator.annotations" . | nindent 4 }}
spec:
  replicas: {{ .Values.thanos.query.replicas | default 2 }}
  replicaLabels:
    - prometheus_replica
    - replica
    - rule_replica
  resourceRequirements:
    requests:
      cpu: {{ .Values.thanos.query.resources.requests.cpu }}
      memory: {{ .Values.thanos.query.resources.requests.memory }}
    limits:
      memory: {{ .Values.thanos.query.resources.limits.memory }}
  # Query will auto-discover stores via operator labels
  queryFrontend:
    replicas: {{ .Values.thanos.query.frontend.replicas | default 1 }}
    resourceRequirements:
      requests:
        cpu: {{ .Values.thanos.query.frontend.resources.requests.cpu }}
        memory: {{ .Values.thanos.query.frontend.resources.requests.memory }}
      limits:
        memory: {{ .Values.thanos.query.frontend.resources.limits.memory }}
    additionalArgs:
      - "--tracing.config="
{{- end }}
