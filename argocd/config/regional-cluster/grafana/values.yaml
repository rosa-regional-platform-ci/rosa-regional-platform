# Bearer token for the Grafana k8s-sidecar service account.
# Must be provided at render time — not generated by the chart.
# Generate once with: openssl rand -hex 20
# Supply via ArgoCD Helm parameter: --helm-set sidecarToken=<value>
# or inject through the render pipeline (scripts/render.py) per-environment.
sidecarToken: ""

grafana:
  image:
    registry: docker.io
    repository: grafana/grafana-oss
    tag: "11.4.0"
    pullPolicy: IfNotPresent

  # FedRAMP: non-root (UID/GID 472)
  securityContext:
    runAsNonRoot: true
    runAsUser: 472
    runAsGroup: 472
    fsGroup: 472

  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 472
    seccompProfile:
      type: RuntimeDefault

  # Static password prevents ArgoCD out-of-sync diffs.
  # Login form is disabled; this value is not used for access.
  adminPassword: "admin"

  # Setting GF_SECURITY_ADMIN_USER and GF_SECURITY_ADMIN_PASSWORD via env
  # prevents the chart from injecting REQ_USERNAME/REQ_PASSWORD (basic auth)
  # into the k8s-sidecar container. The sidecar instead uses a service account
  # Bearer token (see grafana-sidecar-secret.yaml / REQ_HEADERS below).
  env:
    GF_SECURITY_ADMIN_USER: admin
    GF_SECURITY_ADMIN_PASSWORD: admin

  serviceAccount:
    create: true
    name: grafana

  "grafana.ini":
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"

    security:
      disable_gravatar: true

    database:
      type: sqlite3
      path: /var/lib/grafana/grafana.db
      wal: true

    auth:
      disable_login_form: true

    "auth.anonymous":
      enabled: true
      org_role: Admin

    "auth.basic":
      enabled: false

    users:
      allow_sign_up: false
      auto_assign_org_role: Admin

    analytics:
      reporting_enabled: false
      check_for_updates: false
      check_for_plugin_updates: false

    log:
      mode: console
      level: info

  # Load GF_SIDECAR_TOKEN (and REQ_HEADERS) from the sidecar auth Secret into
  # the Grafana pod so the service account provisioning file can reference it
  # via ${GF_SIDECAR_TOKEN}.
  envFromSecrets:
    - name: grafana-sidecar-auth

  # Load AWS_DEFAULT_REGION from the region ConfigMap (rendered from
  # global.aws_region by ApplicationSet) for CloudWatch datasource provisioning.
  envFromConfigMaps:
    - name: grafana-region-env

  # Mount the service account provisioning file so Grafana creates the k8s-sidecar
  # service account with the Bearer token on startup.
  extraVolumes:
    - name: service-account-provisioning
      configMap:
        name: grafana-service-account-provisioning

  extraVolumeMounts:
    - name: service-account-provisioning
      mountPath: /etc/grafana/provisioning/access-control
      readOnly: true

  service:
    type: ClusterIP
    port: 80
    targetPort: 3000

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi
    accessModes:
      - ReadWriteOnce

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Thanos
          type: prometheus
          url: http://thanos-query-frontend-thanos-query.thanos:9090
          isDefault: true
          access: proxy
          editable: false
          jsonData:
            timeInterval: "30s"
            httpMethod: POST

        # CloudWatch datasource — credentials supplied via EKS Pod Identity
        # (see terraform/config/regional-cluster/grafana.tf).
        # AWS_DEFAULT_REGION is injected via grafana-region-env ConfigMap
        # (see templates/grafana-region-env.yaml) using global.aws_region.
        - name: CloudWatch
          type: cloudwatch
          access: proxy
          editable: false
          jsonData:
            authType: default
            defaultRegion: ${AWS_DEFAULT_REGION}

  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  replicas: 1

  # Dashboards fetched from grafana.com at startup
  dashboards:
    default:
      node-exporter-full:
        gnetId: 1860
        revision: 37
        datasource: Thanos
      kubernetes-cluster-monitoring:
        gnetId: 7249
        revision: 1
        datasource: Thanos
      kubernetes-pods:
        gnetId: 6417
        revision: 1
        datasource: Thanos

  # Sidecar watches ConfigMaps labeled grafana_dashboard="1" and places them
  # in subdirectories based on the k8s-sidecar-target-directory annotation.
  # foldersFromFilesStructure creates Grafana folders from the subdirectory names.
  sidecar:
    resources:
      limits:
        cpu: 250m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: grafana
      folderAnnotation: k8s-sidecar-target-directory
      # Inject Bearer token from the grafana-sidecar-auth Secret so the sidecar
      # authenticates with the k8s-sidecar service account instead of basic auth.
      envValueFrom:
        REQ_HEADERS:
          secretKeyRef:
            name: grafana-sidecar-auth
            key: REQ_HEADERS
      provider:
        foldersFromFilesStructure: true
        allowUiUpdates: true
