apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-tmp-platform-services
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  tmp-platform-services.json: {{ .Files.Get "dashboards/infrastructure/tmp-platform-services.json" | quote }}
