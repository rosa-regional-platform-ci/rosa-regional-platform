  name: grafana-dashboard-tmp-eks-control-plane
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Infrastructure"
data:
  tmp-eks-control-plane.json: {{ .Files.Get "dashboards/infrastructure/tmp-eks-control-plane.json" | quote }}
