apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-platform-logs
  namespace: {{ .Release.Namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    k8s-sidecar-target-directory: "Logs"
data:
  platform-logs.json: {{ .Files.Get "dashboards/logs/platform-logs.json" | quote }}
