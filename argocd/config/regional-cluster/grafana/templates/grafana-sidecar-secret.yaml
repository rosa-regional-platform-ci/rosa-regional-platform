{{- $token := required "sidecarToken is required — generate once with: openssl rand -hex 20 and supply via ArgoCD Helm parameter sidecarToken or the render pipeline" .Values.sidecarToken }}
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sidecar-auth
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  # GF_SIDECAR_TOKEN: loaded into Grafana pod via envFromSecrets; used by the
  # service account provisioning file (key: ${GF_SIDECAR_TOKEN}).
  GF_SIDECAR_TOKEN: {{ $token | b64enc }}
  # REQ_HEADERS: injected into the k8s-sidecar container via envValueFrom so it
  # sends Bearer token auth on dashboard reload API calls instead of basic auth.
  REQ_HEADERS: {{ printf "{\"Authorization\": \"Bearer %s\"}" $token | b64enc }}
