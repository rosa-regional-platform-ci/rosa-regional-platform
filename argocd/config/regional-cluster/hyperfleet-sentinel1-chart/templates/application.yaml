apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.hyperfleetSentinel1Chart.name }}
  namespace: {{ .Values.hyperfleetSentinel1Chart.namespace }}
  {{- if .Values.hyperfleetSentinel1Chart.annotations }}
  annotations:
    {{- toYaml .Values.hyperfleetSentinel1Chart.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "hyperfleet-sentinel1-chart.labels" . | nindent 4 }}
spec:
  project: default
  source:
    repoURL: {{ .Values.hyperfleetSentinel1Chart.source.repoURL }}
    targetRevision: {{ .Values.hyperfleetSentinel1Chart.source.targetRevision }}
    path: {{ .Values.hyperfleetSentinel1Chart.source.path }}
    {{- if .Values.hyperfleetSentinel1Chart.values }}
    helm:
      valuesObject:
        extraEnv:
          - name: LOG_LEVEL
            value: debug
        replicaCount: 1
        image:
          registry: quay.io/cdoan0
          repository: sentinel
          tag: v0.1.0-dev
          pullPolicy: Always
        serviceAccount:
          create: true
          name: sentinel-sa
          annotations: {}
        config:
          resourceType: clusters
          resourceSelector: []
          hyperfleetApi:
            baseUrl: "http://hyperfleet-api.hyperfleet-system.svc.cluster.local:8000"
          log_config: true
          messageData:
            id: "resource.id"
            kind: "resource.kind"
            href: "resource.href"
            generation: "resource.generation"
        broker:
          type: rabbitmq
          topic: clusters
          rabbitmq:
            enabled: false
            exchangeType: topic
            url: "amqp://placeholder:placeholder@localhost:5672/"
          external:
            enabled: true
            podidentity: true
            secretMountPath: /mnt/secrets-store
            secretProviderClass: hyperfleet-sentinel-mq-secrets
            createSecretProviderClass: true
            aws:
              region: {{ .Values.global.aws_region }}
              secretName: "{{ .Values.global.cluster_name }}-hyperfleet-mq-credentials"
            url: "amqp://placeholder:placeholder@localhost:5672/"
            exchangeType: topic
            exchange: "clusters"
            queue: "hyperfleet-clusters-landing-zone"
            routingKey: "#"
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.hyperfleetSentinel1Chart.targetNamespace }}
  syncPolicy:
    {{- toYaml .Values.hyperfleetSentinel1Chart.syncPolicy | nindent 4 }}
