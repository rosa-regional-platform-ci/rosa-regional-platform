apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .Values.hyperfleetApiChart.name }}
  namespace: {{ .Values.hyperfleetApiChart.namespace }}
  {{- if .Values.hyperfleetApiChart.annotations }}
  annotations:
    {{- toYaml .Values.hyperfleetApiChart.annotations | nindent 4 }}
  {{- end }}
  labels:
    {{- include "hyperfleet-api-chart.labels" . | nindent 4 }}
spec:
  project: default
  source:
    repoURL: {{ .Values.hyperfleetApiChart.source.repoURL }}
    targetRevision: {{ .Values.hyperfleetApiChart.source.targetRevision }}
    path: {{ .Values.hyperfleetApiChart.source.path }}
    {{- if .Values.hyperfleetApiChart.values }}
    helm:
      valuesObject:
        replicaCount: 1
        image:
          registry: quay.io/openshift-hyperfleet
          repository: hyperfleet-api
          tag: v0.1.0
          pullPolicy: Always
        serviceAccount:
          create: true
          name: hyperfleet-api-sa
          annotations: {}
        server:
          bindAddress: ":8000"
          healthBindAddress: ":8080"
          metricsBindAddress: ":9090"
        service:
          type: ClusterIP
          port: 8000
          healthPort: 8080
          metricsPort: 9090
        database:
          postgresql:
            enabled: false
          external:
            enabled: true
            secretName: hyperfleet-api-db-secrets
            usePodIdentity: true
            secretMountPath: /mnt/secrets-store
            secretProviderClass: ""
            createSecretProviderClass: true
            aws:
              region: {{ .Values.global.aws_region }}
              secretName: "{{ .Values.global.cluster_name }}-hyperfleet-db-credentials"
            sslMode: require
        adapters:
          cluster:
            - adapter1
            - adapter2
          nodepool:
            - adapter3
    {{- end }}
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.hyperfleetApiChart.targetNamespace }}
  syncPolicy:
    {{- toYaml .Values.hyperfleetApiChart.syncPolicy | nindent 4 }}
