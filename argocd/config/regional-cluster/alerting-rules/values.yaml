# Injected by ApplicationSet at runtime — defaults here for helm lint only
global:
  cluster_name: ""
  aws_region: ""
  cluster_type: ""

sla:
  # 99.95% availability target — 0.05% error budget over 30 days
  target: 0.9995
  # Suppress burn rate alerts during initial HCP rollout until this many seconds have elapsed
  initialRolloutGracePeriod: 900
