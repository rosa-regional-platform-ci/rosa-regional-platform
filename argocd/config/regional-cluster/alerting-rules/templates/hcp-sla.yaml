apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: hcp-sla
  namespace: thanos
  labels:
    app.kubernetes.io/name: alerting-rules
    app.kubernetes.io/managed-by: Helm
    operator.thanos.io/prometheus-rule: "true"
spec:
  groups:
    - name: hcp-availability-recording
      interval: 1m
      rules:
        # 1 when the HostedCluster Available condition is True, 0 otherwise.
        # max handles deduplication across Prometheus HA replicas.
        - record: hcp:hostedcluster_available
          expr: |
            max by (namespace, name, cluster) (
              kube_customresource_hostedcluster_status_condition{
                type="KubeAPIServerAvailable",
                status="True",
                cluster_type="management-cluster"
              }
            )

        # Clusters that have never been available.
        # Stops being emitted once HasBeenAvailable annotation is set.
        # label_replace maps exported_namespace → namespace for join.
        - record: hcp:lifecycle_installing
          expr: |
            label_replace(
              hypershift_cluster_waiting_initial_availability_duration_seconds{cluster_type="management-cluster"},
              "namespace", "$1", "exported_namespace", "(.*)"
            )

        # Clusters actively being deleted.
        - record: hcp:lifecycle_deleting
          expr: |
            label_replace(
              hypershift_cluster_deleting_duration_seconds{cluster_type="management-cluster"},
              "namespace", "$1", "exported_namespace", "(.*)"
            )

    - name: hcp-availability-alerts
      rules:
        # Fast burn: detects severe outages within ~6 minutes.
        # Long window (5m) detects the problem; short window (2m)
        # confirms the issue is still active.
        - alert: HCPAvailabilityErrorBudgetFastBurn
          expr: |
            (
              (1 - avg_over_time(hcp:hostedcluster_available[5m])) > (14.4 * (1 - {{ .Values.sla.target }}))
              and
              (1 - avg_over_time(hcp:hostedcluster_available[2m])) > (14.4 * (1 - {{ .Values.sla.target }}))
            )
            unless on(namespace, name, cluster) (hcp:lifecycle_installing or hcp:lifecycle_deleting)
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: HCP availability error budget burning fast
            description: >-
              HostedCluster {{ "{{" }} $labels.name {{ "}}" }} in namespace
              {{ "{{" }} $labels.namespace {{ "}}" }} on cluster
              {{ "{{" }} $labels.cluster {{ "}}" }} is consuming its 30-day
              availability error budget at 14.4x the sustainable rate.

        # Cluster has never become available and has exceeded the grace period.
        # Warning severity — triggers automated remediation, not a human page.
        - alert: HCPInstallTimeout15m
          expr: |
            hcp:lifecycle_installing > {{ .Values.sla.initialRolloutGracePeriod }}
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: HCP install has not become available within 15 minutes
            description: >-
              HostedCluster {{ "{{" }} $labels.name {{ "}}" }} in namespace
              {{ "{{" }} $labels.namespace {{ "}}" }} on cluster
              {{ "{{" }} $labels.cluster {{ "}}" }} has never become available
              and has been waiting for over {{ .Values.sla.initialRolloutGracePeriod }} seconds.

        # Slow burn: detects partial degradation within ~32 minutes.
        # Long window (30m) detects the problem; short window (5m)
        # confirms the issue is still active.
        - alert: HCPAvailabilityErrorBudgetSlowBurn
          expr: |
            (
              (1 - avg_over_time(hcp:hostedcluster_available[30m])) > (6 * (1 - {{ .Values.sla.target }}))
              and
              (1 - avg_over_time(hcp:hostedcluster_available[5m])) > (6 * (1 - {{ .Values.sla.target }}))
            )
            unless on(namespace, name, cluster) (hcp:lifecycle_installing or hcp:lifecycle_deleting)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: HCP availability error budget burning steadily
            description: >-
              HostedCluster {{ "{{" }} $labels.name {{ "}}" }} in namespace
              {{ "{{" }} $labels.namespace {{ "}}" }} on cluster
              {{ "{{" }} $labels.cluster {{ "}}" }} is consuming its 30-day
              availability error budget at 6x the sustainable rate.
