{{- $region := required "global.aws_region is required" .Values.global.aws_region }}
{{- $clusterName := required "global.cluster_name is required" .Values.global.cluster_name }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudwatch-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yml: |
    apiVersion: v1alpha1
    sts-region: {{ $region }}
    static:
      - namespace: AWS/RDS
        name: {{ $clusterName }}-maestro
        regions:
          - {{ $region }}
        dimensions:
          - name: DBInstanceIdentifier
            value: {{ $clusterName }}-maestro
        period: 120
        length: 120
        delay: 120
        metrics:
          - name: CPUUtilization
            statistics: [Average]
          - name: BurstBalance
            statistics: [Average]
          - name: FreeableMemory
            statistics: [Average]
          - name: SwapUsage
            statistics: [Average]
          - name: FreeStorageSpace
            statistics: [Average]
          - name: DatabaseConnections
            statistics: [Sum]
          - name: DiskQueueDepth
            statistics: [Average]
          - name: ReadIOPS
            statistics: [Average]
          - name: WriteIOPS
            statistics: [Average]
          - name: ReadLatency
            statistics: [Average]
          - name: WriteLatency
            statistics: [Average]
          - name: Deadlocks
            statistics: [Sum]
          - name: MaximumUsedTransactionIDs
            statistics: [Average]
          - name: NetworkReceiveThroughput
            statistics: [Average]
          - name: NetworkTransmitThroughput
            statistics: [Average]

      - namespace: AWS/RDS
        name: {{ $clusterName }}-hyperfleet
        regions:
          - {{ $region }}
        dimensions:
          - name: DBInstanceIdentifier
            value: {{ $clusterName }}-hyperfleet
        period: 120
        length: 120
        delay: 120
        metrics:
          - name: CPUUtilization
            statistics: [Average]
          - name: BurstBalance
            statistics: [Average]
          - name: FreeableMemory
            statistics: [Average]
          - name: SwapUsage
            statistics: [Average]
          - name: FreeStorageSpace
            statistics: [Average]
          - name: DatabaseConnections
            statistics: [Sum]
          - name: DiskQueueDepth
            statistics: [Average]
          - name: ReadIOPS
            statistics: [Average]
          - name: WriteIOPS
            statistics: [Average]
          - name: ReadLatency
            statistics: [Average]
          - name: WriteLatency
            statistics: [Average]
          - name: Deadlocks
            statistics: [Sum]
          - name: MaximumUsedTransactionIDs
            statistics: [Average]
          - name: NetworkReceiveThroughput
            statistics: [Average]
          - name: NetworkTransmitThroughput
            statistics: [Average]

      - namespace: AWS/EKS
        name: {{ $clusterName }}
        regions:
          - {{ $region }}
        dimensions:
          - name: ClusterName
            value: {{ $clusterName }}
        period: 120
        length: 120
        delay: 120
        nilToZero: true
        metrics:
          - name: apiserver_storage_size_bytes
            statistics: [Maximum]
          - name: scheduler_schedule_attempts_total
            statistics: [Sum]
          - name: scheduler_pending_pods
            statistics: [Sum]
          - name: scheduler_pending_pods_UNSCHEDULABLE
            statistics: [Sum]
          - name: scheduler_pending_pods_GATED
            statistics: [Sum]

      - namespace: AWS/ApiGateway
        name: {{ $clusterName }}-api
        regions:
          - {{ $region }}
        dimensions:
          - name: ApiName
            value: {{ $clusterName }}-api
        period: 120
        length: 120
        delay: 120
        nilToZero: true
        metrics:
          - name: Count
            statistics: [SampleCount]
          - name: Latency
            statistics: [Average, p50, p99]
          - name: IntegrationLatency
            statistics: [Average, p50, p99]
          - name: 4XXError
            statistics: [Sum]
          - name: 5XXError
            statistics: [Sum]

    discovery:
      jobs:
        - type: AWS/NATGateway
          regions:
            - {{ $region }}
          searchTags:
            - key: Name
              value: ^{{ $clusterName }}-nat-gw-
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: PacketsDropCount
              statistics: [Sum]
              nilToZero: true
            - name: ErrorPortAllocation
              statistics: [Sum]
              nilToZero: true
            - name: ActiveConnectionCount
              statistics: [Maximum]
              nilToZero: true

        - type: AWS/IoT
          regions:
            - {{ $region }}
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: Connect.Success
              statistics: [Sum]
              nilToZero: true
            - name: Connect.AuthError
              statistics: [Sum]
              nilToZero: true
            - name: PublishIn.Success
              statistics: [Sum]
              nilToZero: true
            - name: PublishOut.Success
              statistics: [Sum]
              nilToZero: true

        - type: AWS/AmazonMQ
          regions:
            - {{ $region }}
          searchTags:
            - key: Name
              value: ^{{ $clusterName }}-hyperfleet-mq$
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: MessageCount
              statistics: [Average]
              nilToZero: true
            - name: MessageUnacknowledgedCount
              statistics: [Average]
              nilToZero: true
            - name: ConsumerCount
              statistics: [Average]
              nilToZero: true
            - name: QueueCount
              statistics: [Average]
              nilToZero: true
            - name: NetworkIn
              statistics: [Average]
              nilToZero: true
            - name: NetworkOut
              statistics: [Average]
              nilToZero: true

        - type: AWS/CertificateManager
          regions:
            - {{ $region }}
          searchTags:
            - key: Name
              value: ^{{ $clusterName }}-api-cert$
          period: 86400
          length: 86400
          delay: 3600
          metrics:
            - name: DaysToExpiry
              statistics: [Minimum]
              nilToZero: true
