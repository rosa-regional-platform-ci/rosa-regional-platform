{{- $region := required "global.aws_region is required" .Values.global.aws_region }}
{{- $clusterName := required "global.cluster_name is required" .Values.global.cluster_name }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudwatch-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yml: |
    apiVersion: v1alpha1
    sts-region: {{ $region }}
    static:
      - namespace: AWS/RDS
        name: {{ $clusterName }}-maestro
        regions:
          - {{ $region }}
        dimensions:
          - name: DBInstanceIdentifier
            value: {{ $clusterName }}-maestro
        period: 120
        length: 120
        delay: 120
        metrics:
          - name: CPUUtilization
            statistics: [Average]
          - name: FreeableMemory
            statistics: [Average]
          - name: DatabaseConnections
            statistics: [Sum]
          - name: ReadLatency
            statistics: [Average]
          - name: WriteLatency
            statistics: [Average]
          - name: FreeStorageSpace
            statistics: [Average]

      - namespace: AWS/RDS
        name: {{ $clusterName }}-hyperfleet
        regions:
          - {{ $region }}
        dimensions:
          - name: DBInstanceIdentifier
            value: {{ $clusterName }}-hyperfleet
        period: 120
        length: 120
        delay: 120
        metrics:
          - name: CPUUtilization
            statistics: [Average]
          - name: FreeableMemory
            statistics: [Average]
          - name: DatabaseConnections
            statistics: [Sum]
          - name: ReadLatency
            statistics: [Average]
          - name: WriteLatency
            statistics: [Average]
          - name: FreeStorageSpace
            statistics: [Average]

      - namespace: AWS/EKS
        name: {{ $clusterName }}
        regions:
          - {{ $region }}
        dimensions:
          - name: ClusterName
            value: {{ $clusterName }}
        period: 120
        length: 120
        delay: 120
        nilToZero: true
        metrics:
          - name: apiserver_storage_size_bytes
            statistics: [Maximum]
          - name: scheduler_schedule_attempts_total
            statistics: [Sum]
          - name: scheduler_pending_pods
            statistics: [Sum]
          - name: scheduler_pending_pods_UNSCHEDULABLE
            statistics: [Sum]
          - name: scheduler_pending_pods_GATED
            statistics: [Sum]

    {{- if .Values.apiGatewayId }}
      - namespace: AWS/ApiGateway
        name: {{ $clusterName }}-api
        regions:
          - {{ $region }}
        dimensions:
          - name: ApiId
            value: {{ .Values.apiGatewayId }}
        period: 120
        length: 120
        delay: 120
        metrics:
          - name: Count
            statistics: [SampleCount]
          - name: Latency
            statistics: [Average, p99]
          - name: 4XXError
            statistics: [Sum]
          - name: 5XXError
            statistics: [Sum]
    {{- end }}
