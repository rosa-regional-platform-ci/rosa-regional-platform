apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudwatch-exporter
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: cloudwatch-exporter
    app.kubernetes.io/instance: {{ .Release.Name }}
data:
  config.yml: |
    apiVersion: v1alpha1
    sts-region: {{ required "global.aws_region is required" .Values.global.aws_region }}
    discovery:
      jobs:
        - type: AWS/ApiGateway
          regions:
            - {{ .Values.global.aws_region }}
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: Count
              statistics: [SampleCount]
            - name: Latency
              statistics: [Average, p99]
            - name: 4XXError
              statistics: [Sum]
            - name: 5XXError
              statistics: [Sum]

        - type: AWS/RDS
          regions:
            - {{ .Values.global.aws_region }}
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: CPUUtilization
              statistics: [Average]
            - name: FreeableMemory
              statistics: [Average]
            - name: DatabaseConnections
              statistics: [Sum]
            - name: ReadLatency
              statistics: [Average]
            - name: WriteLatency
              statistics: [Average]
            - name: FreeStorageSpace
              statistics: [Average]

        - type: AWS/EKS
          regions:
            - {{ .Values.global.aws_region }}
          searchTags:
            - key: Name
              value: ^{{ required "global.cluster_name is required" .Values.global.cluster_name }}$
          period: 120
          length: 120
          delay: 120
          metrics:
            # API Server - Requests
            - name: apiserver_request_total
              statistics: [Sum]
            - name: apiserver_request_total_4XX
              statistics: [Sum]
            - name: apiserver_request_total_5XX
              statistics: [Sum]
            - name: apiserver_request_total_429
              statistics: [Sum]
            # API Server - Latency (per-verb P99)
            - name: apiserver_request_duration_seconds_GET_P99
              statistics: [Average]
            - name: apiserver_request_duration_seconds_LIST_P99
              statistics: [Average]
            - name: apiserver_request_duration_seconds_POST_P99
              statistics: [Average]
            - name: apiserver_request_duration_seconds_PUT_P99
              statistics: [Average]
            - name: apiserver_request_duration_seconds_DELETE_P99
              statistics: [Average]
            # API Server - Inflight
            - name: apiserver_current_inflight_requests_READONLY
              statistics: [Sum]
            - name: apiserver_current_inflight_requests_MUTATING
              statistics: [Sum]
            # API Server - Webhooks
            - name: apiserver_admission_webhook_rejection_count
              statistics: [Sum]
            # Storage
            - name: apiserver_storage_size_bytes
              statistics: [Maximum]
            # Scheduler
            - name: scheduler_schedule_attempts_total
              statistics: [Sum]
            - name: scheduler_pending_pods
              statistics: [Sum]
            - name: scheduler_pending_pods_UNSCHEDULABLE
              statistics: [Sum]
            - name: scheduler_pending_pods_GATED
              statistics: [Sum]
