pagerduty:
  enabled: false

kube-prometheus-stack:
  nameOverride: "monitoring"
  namespaceOverride: "monitoring"

  crds:
    enabled: true

  defaultRules:
    create: false

  alertmanager:
    enabled: true
    tplConfig: true
    config:
      route:
        # Default receiver drops alerts not matched by any route.
        # All real delivery happens via explicit routes with continue: true,
        # so alerts flow through every matching receiver (SNS, PagerDuty, etc.).
        receiver: "null"
        routes:
          - receiver: sns-alerts
            continue: true
          - receiver: pagerduty
            match_re:
              severity: "warning|critical"
            continue: true
      receivers:
        - name: "null"
        - name: sns-alerts
          sns_configs:
            - topic_arn: 'arn:aws:sns:{{ .Values.global.aws_region }}:{{ .Values.global.aws_account_id }}:{{ .Values.global.cluster_name }}-alerts'
              sigv4:
                region: '{{ .Values.global.aws_region }}'
              send_resolved: true
        - name: pagerduty
          pagerduty_configs:
            - routing_key_file: /etc/alertmanager/secrets/pagerduty-integration-key/integration_key
              severity: '{{ "{{" }} if .CommonLabels.severity {{ "}}" }}{{ "{{" }} .CommonLabels.severity {{ "}}" }}{{ "{{" }} else {{ "}}" }}critical{{ "{{" }} end {{ "}}" }}'
              send_resolved: true
    alertmanagerSpec:
      secrets:
        - pagerduty-integration-key
      replicas: 2
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          memory: 128Mi
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: alertmanager
  grafana:
    enabled: false

  prometheusOperator:
    admissionWebhooks:
      # Override the upstream hook-delete-policy (before-hook-creation,hook-succeeded)
      # using the ArgoCD-native annotation, which takes precedence over the
      # hardcoded helm.sh/hook-delete-policy in the subchart templates.
      # With hook-succeeded, if the ArgoCD controller is replaced while a hook
      # Job is in flight (bootstrap self-update, chart upgrades, node rotation),
      # the completed Job is deleted before the new controller can observe it,
      # leaving the sync stuck indefinitely.
      # Ref: https://github.com/argoproj/argo-cd/issues/21055
      #      https://github.com/argoproj/argo-cd/issues/4979
      # Values path: https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
      #
      # "annotations" targets the PreSync create Job (generates TLS cert),
      # "patch.annotations" targets the PostSync patch Job (patches webhooks).
      annotations:
        argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
      patch:
        annotations:
          argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    prometheusConfigReloader:
      resources:
        requests:
          cpu: 10m
          memory: 32Mi
        limits:
          memory: 64Mi

  kube-state-metrics:
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi

  prometheus-node-exporter:
    priorityClassName: system-node-critical
    tolerations:
      - operator: Exists
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        memory: 128Mi

  prometheus:
    prometheusSpec:
      replicas: 2
      retention: "14d"
      retentionSize: "85GB"
      serviceMonitorSelectorNilUsesHelmValues: false
      # External labels are required for Thanos to differentiate metrics from
      # multiple clusters. These are injected by the ApplicationSet at sync time.
      externalLabels:
        cluster: '{{ required "global.cluster_name is required" .Values.global.cluster_name }}'
        cluster_type: '{{ .Values.global.cluster_type | default "regional" }}'
      remoteWrite:
        - url: http://thanos-receive-router-thanos-receive.thanos:19291/api/v1/receive
      resources:
        requests:
          cpu: 200m
          memory: 1Gi
        limits:
          memory: 2Gi

      serviceMonitorNamespaceSelector: {}
      serviceMonitorSelector: {}

      podMonitorSelectorNilUsesHelmValues: false
      podMonitorNamespaceSelector: {}
      podMonitorSelector: {}

      # This prevents us from scheduling prometheus pods within the same AZ,
      # so that we have at least one zone with a replica
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus

      storageSpec:
        volumeClaimTemplate:
          metadata:
            name: prometheus-data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 100Gi
