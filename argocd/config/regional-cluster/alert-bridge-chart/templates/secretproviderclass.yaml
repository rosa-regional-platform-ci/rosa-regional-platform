{{- if .Values.secretProviderClass.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ .Values.secretProviderClass.name }}
  namespace: {{ index .Values "alert-bridge-chart" "targetNamespace" }}
spec:
  provider: aws
  parameters:
    usePodIdentity: "true"
    region: {{ .Values.global.aws_region | required "aws_region must be set" }}
    objects: |
      - objectName: "/{{ .Values.global.cluster_name }}/alerting/sns-topic-arn"
        objectType: "ssmparameter"
        objectAlias: "sns-topic-arn"
  secretObjects:
    - secretName: {{ .Values.secretProviderClass.secretName }}
      type: Opaque
      data:
        - objectName: sns-topic-arn
          key: sns-topic-arn
{{- end }}
