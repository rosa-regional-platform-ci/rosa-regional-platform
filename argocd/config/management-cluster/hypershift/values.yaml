# Default values for hypershift-install chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# All values are namespaced under 'hypershift' to maintain consistency
# with the rendering system and avoid conflicts with other charts
hypershift:
  # AWS region — used by the ASCP SecretProviderClass to fetch from Secrets Manager
  region: us-east-1

  # External DNS configuration
  externalDns:
    image: registry.redhat.io/edo/external-dns-rhel9@sha256:591de53fdaae236c8d384deb6c927f4f397bf44ce4580bbc70b57c112cf22315
    domain: ".example.com"

  # Hypershift configuration
  # IMPORTANT: Use an official, immutable image reference pinned by SHA-256 digest.
  # Do NOT use personal registry namespaces or mutable tags (e.g., :test20, :latest).
  # Example: registry.redhat.io/openshift4/ose-hypershift-operator@sha256:<digest>
  hypershift:
    image: registry.redhat.io/openshift4/ose-hypershift-operator@sha256:REPLACE_WITH_VERIFIED_DIGEST
