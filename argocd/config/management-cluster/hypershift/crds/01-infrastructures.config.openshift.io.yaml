# HACK: The HyperShift operator expects the OpenShift Infrastructure CRD
# (config.openshift.io/v1) to exist on the management cluster. On OpenShift
# this is built-in, but on EKS it does not exist. The AWS endpoint service
# controller (hypershift-operator/controllers/platform/aws/controller.go)
# fetches the management cluster's Infrastructure CR to read
# status.infrastructureName for tagging VPC Endpoint Services.
#
# This is a minimal CRD — just enough schema to store and serve the fields
# the operator reads. It is NOT the full upstream OpenShift CRD.
#
# Long-term fix: The operator should use hostedCluster.Spec.InfraID instead
# of the management cluster's InfrastructureName — the VPCE belongs to the
# hosted cluster, not the management cluster. See the discussion with the
# HyperShift team about removing this dependency.
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: infrastructures.config.openshift.io
spec:
  group: config.openshift.io
  names:
    kind: Infrastructure
    listKind: InfrastructureList
    plural: infrastructures
    singular: infrastructure
  scope: Cluster
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-preserve-unknown-fields: true
            status:
              type: object
              properties:
                infrastructureName:
                  type: string
                platformStatus:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
      subresources:
        status: {}
