prometheus-yet-another-cloudwatch-exporter:
  fullnameOverride: cloudwatch-exporter

  serviceAccount:
    create: true
    name: cloudwatch-exporter

  configMap:
    enabled: true

  config: |
    apiVersion: v1alpha1
    sts-region: {{ .Values.global.aws_region }}
    static:
      - namespace: AWS/EKS
        name: {{ .Values.global.cluster_name }}
        regions:
          - {{ .Values.global.aws_region }}
        dimensions:
          - name: ClusterName
            value: {{ .Values.global.cluster_name }}
        metrics:
          - name: apiserver_storage_size_bytes
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Maximum]
          - name: scheduler_schedule_attempts_total
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods_UNSCHEDULABLE
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]
          - name: scheduler_pending_pods_GATED
            period: 120
            length: 120
            delay: 120
            nilToZero: true
            statistics: [Sum]

    discovery:
      jobs:
        - type: AWS/CloudFront
          regions:
            - us-east-1
          searchTags:
            - key: ManagementCluster
              value: {{ .Values.global.cluster_name }}
          period: 120
          length: 120
          delay: 120
          metrics:
            - name: Requests
              statistics: [Sum]
              nilToZero: true
            - name: TotalErrorRate
              statistics: [Average]
              nilToZero: true
            - name: 4xxErrorRate
              statistics: [Average]
              nilToZero: true
            - name: 5xxErrorRate
              statistics: [Average]
              nilToZero: true

  extraArgs:
    fips: true
    scraping-interval: 120

  serviceMonitor:
    enabled: true

  podSecurityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    readOnlyRootFilesystem: true
    runAsNonRoot: true
    runAsUser: 65534
    seccompProfile:
      type: RuntimeDefault

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      memory: 256Mi

  aws:
    role: ""
