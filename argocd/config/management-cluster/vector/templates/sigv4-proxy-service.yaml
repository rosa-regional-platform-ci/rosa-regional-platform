apiVersion: v1
kind: Service
metadata:
  name: sigv4-proxy-logs
  namespace: {{ include "vector.namespace" . }}
  labels:
    app.kubernetes.io/name: sigv4-proxy-logs
    app.kubernetes.io/component: logs-proxy
  annotations:
    {{- include "vector.annotations" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: sigv4-proxy-logs
  ports:
    - name: proxy
      port: {{ .Values.sigv4Proxy.port }}
      targetPort: {{ .Values.sigv4Proxy.port }}
      protocol: TCP
