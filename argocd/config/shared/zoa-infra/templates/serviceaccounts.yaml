{{- range $key, $sa := .Values.serviceAccounts }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa.name }}
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "zoa-infra.labels" $ | nindent 4 }}
    zoa.rosa.io/role: {{ $key }}
  annotations:
    zoa.rosa.io/description: {{ $sa.description | quote }}
automountServiceAccountToken: true
{{- end }}
